# Run all commands from apps/web/:
#   podman-compose up -d
#   podman-compose restart electric
#   podman-compose logs electric -f

name: montte_web
services:
   rustfs:
      image: docker.io/rustfs/rustfs:latest
      environment:
         RUSTFS_ACCESS_KEY: rustfsadmin
         RUSTFS_SECRET_KEY: rustfsadmin123
         RUSTFS_VOLUMES: /data
         RUSTFS_ADDRESS: ":9000"
         RUSTFS_CONSOLE_ENABLE: "true"
         RUSTFS_CONSOLE_ADDRESS: ":9001"
      volumes:
         - rustfsdata:/data
      ports:
         - "9000:9000" # S3 API
         - "9001:9001" # Web Console

   montte-db:
      image: docker.io/library/postgres:17
      command: postgres -c wal_level=logical
      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: password
         POSTGRES_DB: montte
      volumes:
         - montte_pgdata:/var/lib/postgresql/data
      ports:
         - "5432:5432"
      healthcheck:
         test: ["CMD-SHELL", "pg_isready -U postgres -d montte"]
         interval: 10s
         timeout: 5s
         retries: 5

   redis:
      image: docker.io/library/redis:7-alpine
      ports:
         - "6379:6379"
      volumes:
         - redis_data:/data
      command: redis-server --appendonly yes
      healthcheck:
         test: ["CMD", "redis-cli", "ping"]
         interval: 10s
         timeout: 5s
         retries: 5

volumes:
   montte_pgdata:
   rustfsdata:
   redis_data:
