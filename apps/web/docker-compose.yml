# Run all commands from apps/web/:
#   podman-compose up -d
#   podman-compose restart electric
#   podman-compose logs electric -f

services:
   minio:
      image: docker.io/minio/minio:latest
      command: server /data --console-address ":9001"
      environment:
         MINIO_ROOT_USER: minioadmin
         MINIO_ROOT_PASSWORD: minioadmin123
         MINIO_DEFAULT_BUCKETS: montte-documents
      volumes:
         - miniodata:/data
      ports:
         - "9000:9000" # S3 API
         - "9001:9001" # Web Console
      healthcheck:
         test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
         interval: 30s
         timeout: 20s
         retries: 3

   montte-db:
      image: docker.io/paradedb/paradedb:latest
      command: postgres -c wal_level=logical
      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: password
         POSTGRES_DB: montte
      volumes:
         - montte_pgdata:/var/lib/postgresql
      ports:
         - "5432:5432"
      healthcheck:
         test: ["CMD-SHELL", "pg_isready -U postgres -d montte"]
         interval: 10s
         timeout: 5s
         retries: 5

   redis:
      image: docker.io/library/redis:7-alpine
      ports:
         - "6379:6379"
      volumes:
         - redis_data:/data
      command: redis-server --appendonly yes
      healthcheck:
         test: ["CMD", "redis-cli", "ping"]
         interval: 10s
         timeout: 5s
         retries: 5

volumes:
   montte_pgdata:
   miniodata:
   redis_data:
