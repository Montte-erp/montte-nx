name: Release Weekly

on:
   schedule:
      - cron: "0 14 * * 5"
   workflow_dispatch:
      inputs:
         dry_run:
            description: "Generate notes only, do not create tag/release"
            required: false
            type: boolean
            default: false

permissions:
   contents: write
   pull-requests: read
   id-token: write

jobs:
   release:
      runs-on: ubuntu-latest
      steps:
         - name: Checkout
           uses: actions/checkout@v6
           with:
              fetch-depth: 0
              fetch-tags: true
              persist-credentials: false

         - name: Compute version
           id: version
           run: |
              VERSION=$(date -u '+%Y.%m.%d')
              TAG="v${VERSION}"
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

              LAST_TAG=$(git tag --list 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]' --sort=-version:refname | head -n1)
              if [ -z "$LAST_TAG" ]; then
                FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD | tail -n1)
                LAST_TAG="$FIRST_COMMIT"
              fi
              echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"

              if git rev-parse "$TAG" >/dev/null 2>&1; then
                echo "Tag $TAG already exists — skipping" >&2
                echo "skip=true" >> "$GITHUB_OUTPUT"
              else
                echo "skip=false" >> "$GITHUB_OUTPUT"
              fi

         - name: Collect changes since last tag
           if: steps.version.outputs.skip != 'true'
           id: changes
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              LAST_TAG: ${{ steps.version.outputs.last_tag }}
           run: |
              {
                echo "## Commits"
                git log --pretty=format:'- %s (%h) by %an' "${LAST_TAG}..HEAD"
                echo
                echo
                echo "## Merged PRs"
                gh pr list --state merged --limit 100 --search "merged:>$(git log -1 --format=%cI ${LAST_TAG})" --json number,title,author,labels,url \
                  --jq '.[] | "- #\(.number) \(.title) by @\(.author.login) — \(.url)"' || true
              } > changes.md
              cat changes.md

         - name: Generate release notes via opencode
           if: steps.version.outputs.skip != 'true'
           continue-on-error: true
           uses: anomalyco/opencode/github@latest
           env:
              OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
              SKILL_FILE: .agents/skills/release/SKILL.md
              RELEASE_NOTES_REFERENCE: .agents/skills/release/references/release-notes.md
              VALIDATION_REFERENCE: .agents/skills/release/references/release-validation.md
              CHANGES_FILE: changes.md
              OUTPUT_FILE: RELEASE_NOTES.md
              RELEASE_VERSION: ${{ steps.version.outputs.version }}
           with:
              model: opencode-go/deepseek-v4-flash
              prompt: |
                 Leia `$SKILL_FILE`, `$RELEASE_NOTES_REFERENCE` e `$VALIDATION_REFERENCE`.

                 Depois leia `$CHANGES_FILE` e gere as release notes semanais do Montte em `$OUTPUT_FILE` para a versão `$RELEASE_VERSION`.

                 Regras absolutas:
                 - siga a estrutura e a classificação de `$RELEASE_NOTES_REFERENCE`;
                 - use PR como unidade canônica quando existir;
                 - escreva em pt-BR com foco em valor para usuário;
                 - não inclua H1 com o nome ou versão da release;
                 - não invente links, imagens, documentação, números ou funcionalidades;
                 - não escreva nada fora de `$OUTPUT_FILE`.

         - name: Verify release notes
           if: steps.version.outputs.skip != 'true'
           run: |
              if [ ! -s RELEASE_NOTES.md ]; then
                echo "RELEASE_NOTES.md missing or empty — opencode step failed" >&2
                exit 1
              fi
              if grep -Eiq '(^|[^[:alnum:]_])TODO([^[:alnum:]_]|$)|!\[Demo\]|\(TODO|link se existir|senão TODO' RELEASE_NOTES.md; then
                echo "RELEASE_NOTES.md contains unfinished placeholder text" >&2
                exit 1
              fi
              if head -n 1 RELEASE_NOTES.md | grep -Eq '^# +Montte '; then
                echo "RELEASE_NOTES.md repeats the GitHub release title in the body" >&2
                exit 1
              fi

         - name: Create tag and GitHub release
           if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              TAG: ${{ steps.version.outputs.tag }}
           run: |
              gh release create "$TAG" \
                --target "$GITHUB_SHA" \
                --title "Montte ${{ steps.version.outputs.version }}" \
                --notes-file RELEASE_NOTES.md

         - name: Create Linear release
           if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
           env:
              LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
              VERSION: ${{ steps.version.outputs.version }}
           run: |
              NOTES=$(jq -Rs . < RELEASE_NOTES.md)
              curl -sS -X POST https://api.linear.app/graphql \
                -H "Authorization: $LINEAR_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg version "$VERSION" --argjson notes "$NOTES" '{
                  query: "mutation($input: ReleaseCreateInput!) { releaseCreate(input: $input) { success release { id url } } }",
                  variables: { input: { name: ("Montte " + $version), description: $notes } }
                }')" | tee linear-response.json
              jq -e '.data.releaseCreate.success' linear-response.json

         - name: Upload notes artifact
           if: steps.version.outputs.skip != 'true'
           uses: actions/upload-artifact@v4
           with:
              name: release-notes-${{ steps.version.outputs.version }}
              path: |
                 changes.md
                 RELEASE_NOTES.md
