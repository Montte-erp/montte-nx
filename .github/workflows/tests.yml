name: Tests

on:
   pull_request:
      branches: ["*"]
      types: [opened, synchronize, reopened, ready_for_review]

jobs:
   test:
      if: github.event.pull_request.draft == false
      runs-on: ubuntu-latest
      steps:
         - name: Checkout code
           uses: actions/checkout@v4
           with:
              fetch-depth: 0
              filter: tree:0

         - name: Bun & Nx Setup
           uses: ./.github/actions/setup-bun-nx

         - name: Run Nx affected tests with coverage
           run: bunx nx affected -t test --base=origin/master --head=HEAD -- --coverage --coverage.reporter=lcov

         - name: Upload coverage reports to Codecov
           uses: codecov/codecov-action@v5
           with:
              token: ${{ secrets.CODECOV_TOKEN }}
              files: ./apps/*/coverage/lcov.info,./core/*/coverage/lcov.info,./packages/*/coverage/lcov.info
              fail_ci_if_error: true
