name: Blog Post from Release

on:
   release:
      types: [published]
   workflow_dispatch:
      inputs:
         tag:
            description: "Tag da release (ex: v2026.05.15)"
            required: true
            type: string
         force:
            description: "Sobrescrever post existente"
            required: false
            type: boolean
            default: false

permissions:
   contents: write
   pull-requests: write
   id-token: write

jobs:
   generate:
      runs-on: ubuntu-latest
      steps:
         - name: Checkout
           uses: actions/checkout@v6
           with:
              fetch-depth: 0
              persist-credentials: true
              token: ${{ secrets.GITHUB_TOKEN }}

         - name: Resolve release metadata
           id: meta
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              INPUT_TAG: ${{ github.event.inputs.tag }}
              EVENT_TAG: ${{ github.event.release.tag_name }}
              REPO: ${{ github.repository }}
           run: |
              TAG="${INPUT_TAG:-$EVENT_TAG}"
              if [ -z "$TAG" ]; then
                echo "No tag resolved — provide one via workflow_dispatch or release event" >&2
                exit 1
              fi
              if ! [[ "$TAG" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]]; then
                echo "Tag '$TAG' não bate com padrão vYYYY.MM.DD — pulando" >&2
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              VERSION="${TAG#v}"
              SLUG="montte-${VERSION//./-}"
              POST_PATH="apps/landing/src/content/blog/${SLUG}.md"
              COVER_PATH="apps/landing/src/assets/blog/${SLUG}.svg"
              RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
              PUBLISHED_AT=$(gh release view "$TAG" --json publishedAt --jq '.publishedAt' | cut -d'T' -f1)
              if [ -z "$PUBLISHED_AT" ]; then
                PUBLISHED_AT=$(date -u '+%Y-%m-%d')
              fi
              {
                echo "skip=false"
                echo "tag=$TAG"
                echo "version=$VERSION"
                echo "slug=$SLUG"
                echo "post_path=$POST_PATH"
                echo "cover_path=$COVER_PATH"
                echo "release_url=$RELEASE_URL"
                echo "published_at=$PUBLISHED_AT"
                echo "branch=blog/post-${SLUG}"
              } >> "$GITHUB_OUTPUT"

         - name: Skip if post exists
           id: check
           if: steps.meta.outputs.skip != 'true'
           env:
              POST_PATH: ${{ steps.meta.outputs.post_path }}
              FORCE: ${{ github.event.inputs.force }}
           run: |
              if [ -f "$POST_PATH" ] && [ "$FORCE" != "true" ]; then
                echo "Post já existe em $POST_PATH (use force=true pra sobrescrever)" >&2
                echo "skip=true" >> "$GITHUB_OUTPUT"
              else
                echo "skip=false" >> "$GITHUB_OUTPUT"
              fi

         - name: Fetch release notes
           if: steps.meta.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              TAG: ${{ steps.meta.outputs.tag }}
           run: |
              gh release view "$TAG" --json body --jq .body > release-notes.md
              if [ ! -s release-notes.md ]; then
                echo "Release notes vazias pra $TAG" >&2
                exit 1
              fi
              head -c 200 release-notes.md
              echo

         - name: Generate cover SVG (placeholder)
           if: steps.meta.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
           env:
              VERSION: ${{ steps.meta.outputs.version }}
              COVER_PATH: ${{ steps.meta.outputs.cover_path }}
           run: |
              mkdir -p "$(dirname "$COVER_PATH")"
              cat > "$COVER_PATH" <<EOF
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Montte ${VERSION}">
                 <defs>
                    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                       <stop offset="0%" stop-color="#0c1a17" />
                       <stop offset="50%" stop-color="#0a1411" />
                       <stop offset="100%" stop-color="#06100d" />
                    </linearGradient>
                    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
                       <stop offset="0%" stop-color="#0c5343" stop-opacity="0.55" />
                       <stop offset="100%" stop-color="#0c5343" stop-opacity="0" />
                    </radialGradient>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                       <path d="M40 0H0V40" fill="none" stroke="#1a2b26" stroke-width="0.5" />
                    </pattern>
                 </defs>
                 <rect width="1200" height="630" fill="url(#bg)" />
                 <rect width="1200" height="630" fill="url(#grid)" />
                 <rect width="1200" height="630" fill="url(#glow)" />
                 <g transform="translate(80,80)">
                    <text x="0" y="0" fill="#7a8a85" font-family="ui-monospace, SFMono-Regular, monospace" font-size="20" letter-spacing="4">RELEASE NOTES</text>
                 </g>
                 <g transform="translate(80,320)">
                    <text x="0" y="0" fill="#f5f5f4" font-family="ui-serif, Georgia, serif" font-weight="900" font-size="140" letter-spacing="-6">${VERSION}</text>
                 </g>
                 <g transform="translate(80,540)">
                    <circle cx="14" cy="14" r="14" fill="#0c5343" />
                    <text x="42" y="22" fill="#f5f5f4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.5">Montte</text>
                 </g>
              </svg>
              EOF
              echo "Capa placeholder gerada em $COVER_PATH (substitua por design final antes de mergear)"

         - name: Generate blog post via opencode
           if: steps.meta.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
           uses: anomalyco/opencode/github@latest
           env:
              OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
              RELEASE_NOTES_FILE: release-notes.md
              MARKETING_SKILL_FILE: .agents/skills/marketing/SKILL.md
              BLOG_REFERENCE: .agents/skills/marketing/references/blog.md
              RELEASE_POST_REFERENCE: .agents/skills/marketing/references/release-post.md
              OUTPUT_FILE: ${{ steps.meta.outputs.post_path }}
              RELEASE_TAG: ${{ steps.meta.outputs.tag }}
              RELEASE_VERSION: ${{ steps.meta.outputs.version }}
              RELEASE_SLUG: ${{ steps.meta.outputs.slug }}
              RELEASE_URL: ${{ steps.meta.outputs.release_url }}
              PUBLISHED_AT: ${{ steps.meta.outputs.published_at }}
           with:
              model: opencode-go/deepseek-v4-flash
              prompt: |
                 Leia `$MARKETING_SKILL_FILE`, `$BLOG_REFERENCE` e `$RELEASE_POST_REFERENCE`.

                 Depois leia `$RELEASE_NOTES_FILE` e escreva em `$OUTPUT_FILE` um post de blog do Montte para `$RELEASE_TAG`.

                 Regras absolutas:
                 - release notes sao a unica fonte factual;
                 - siga o frontmatter e o corpo definidos em `$RELEASE_POST_REFERENCE`;
                 - aplique a voz, humanizacao e anti-padroes de `$BLOG_REFERENCE`;
                 - nao inclua H1 no markdown;
                 - nao use travessao longo ou medio;
                 - nao invente numeros, PRs, prazos, nomes, cicatrizes ou funcionalidades;
                 - nao escreva nada fora de `$OUTPUT_FILE`.

         - name: Validate generated post
           if: steps.meta.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
           env:
              POST_PATH: ${{ steps.meta.outputs.post_path }}
           run: |
              if [ ! -s "$POST_PATH" ]; then
                echo "Post não foi gerado em $POST_PATH" >&2
                exit 1
              fi
              if grep -Pq '[\x{2014}\x{2013}]' "$POST_PATH"; then
                echo "Post contém travessão (— ou –), substitua antes de mergear" >&2
                grep -nP '[\x{2014}\x{2013}]' "$POST_PATH" || true
                exit 1
              fi
              for field in 'title:' 'description:' 'publishedAt:' 'author:' 'category:' 'coverImage:' 'releaseUrl:' 'releaseVersion:'; do
                if ! grep -q "^${field}" "$POST_PATH"; then
                  echo "Frontmatter está sem campo obrigatório: $field" >&2
                  exit 1
                fi
              done
              if head -n 30 "$POST_PATH" | grep -Eq '^# '; then
                echo "Post tem H1 no markdown (deve vir só do frontmatter)" >&2
                exit 1
              fi
              echo "Validação passou ✓"

         - name: Setup Bun
           if: steps.meta.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: latest

         - name: Build landing to verify schema
           if: steps.meta.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
           run: |
              bun install --frozen-lockfile
              bun run landing:build

         - name: Open PR with new post
           if: steps.meta.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              TAG: ${{ steps.meta.outputs.tag }}
              VERSION: ${{ steps.meta.outputs.version }}
              SLUG: ${{ steps.meta.outputs.slug }}
              POST_PATH: ${{ steps.meta.outputs.post_path }}
              COVER_PATH: ${{ steps.meta.outputs.cover_path }}
              RELEASE_URL: ${{ steps.meta.outputs.release_url }}
              BRANCH: ${{ steps.meta.outputs.branch }}
           run: |
              git config user.name "montte-bot"
              git config user.email "bot@users.noreply.github.com"
              git checkout -B "$BRANCH"
              git add "$POST_PATH" "$COVER_PATH"
              git commit -m "blog: post para $TAG

              Gerado automaticamente a partir das release notes de $TAG.
              Cover image é um placeholder SVG — substitua por design final antes de mergear."
              git push origin "$BRANCH" --force-with-lease

              PR_BODY=$(cat <<MSG
              ## Post auto-gerado a partir da release $TAG

              **Fonte:** [Release $TAG]($RELEASE_URL)
              **Arquivo:** \`$POST_PATH\`
              **Slug:** \`/blog/$SLUG\`

              ### Checklist antes de mergear

              - [ ] Revisei o conteúdo, voz bate com o skill \`marketing\`
              - [ ] Substitui o cover SVG placeholder por design final em \`$COVER_PATH\` (ou .jpg)
              - [ ] Confiro que descrição tem 40 a 60 palavras e 1ª frase é TL;DR
              - [ ] Confiro que keyTakeaways e faq estão preenchidos
              - [ ] Rodei \`bun run landing:build\` local
              - [ ] Verifiquei que não há travessão \`—\` ou anglicismo evitável

              ### O que o workflow fez

              1. Buscou release notes via \`gh release view $TAG\`
              2. Rodou opencode com skill \`.agents/skills/marketing/SKILL.md\` como referência
              3. Gerou cover SVG placeholder com a versão
              4. Validou frontmatter + ausência de travessão
              5. Buildou \`apps/landing\` pra garantir schema válido

              ---
              🤖 Automatizado pelo workflow \`blog-post-from-release.yml\`
              MSG
              )

              gh pr create \
                --title "blog: post para $TAG" \
                --body "$PR_BODY" \
                --base master \
                --head "$BRANCH" \
                --label "blog,automated" || \
              gh pr edit "$BRANCH" --body "$PR_BODY"

         - name: Upload artifacts
           if: steps.meta.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
           uses: actions/upload-artifact@v4
           with:
              name: blog-post-${{ steps.meta.outputs.version }}
              path: |
                 release-notes.md
                 ${{ steps.meta.outputs.post_path }}
                 ${{ steps.meta.outputs.cover_path }}
