name: PR Review AI

on:
   pull_request:
      types: [opened, synchronize, reopened, ready_for_review]
   workflow_dispatch:
      inputs:
         pr_number:
            description: "Número da PR para revisão"
            required: true
            type: number

permissions:
   id-token: write
   contents: read
   pull-requests: write
   issues: write
   checks: read

jobs:
   review:
      if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
      runs-on: ubuntu-latest
      timeout-minutes: 30
      steps:
         - name: Resolve PR metadata
           id: pr
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              GH_REPO: ${{ github.repository }}
              EVENT_NAME: ${{ github.event_name }}
              EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
              INPUT_PR_NUMBER: ${{ inputs.pr_number }}
           run: |
              if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                PR_NUMBER="$INPUT_PR_NUMBER"
              else
                PR_NUMBER="$EVENT_PR_NUMBER"
              fi

              if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "0" ]; then
                echo "PR_NUMBER not found" >&2
                exit 1
              fi

              gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json number,headRefOid,baseRefName --jq '
                "number=\(.number)\nhead_sha=\(.headRefOid)\nbase_ref=\(.baseRefName)"
              ' >> "$GITHUB_OUTPUT"

         - name: Checkout PR head
           uses: actions/checkout@v6
           with:
              ref: ${{ steps.pr.outputs.head_sha }}
              fetch-depth: 0
              persist-credentials: false

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: latest

         - name: Install dependencies
           run: bun install --frozen-lockfile

         - name: Run Flue PR Review
           env:
              OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              PR_NUMBER: ${{ steps.pr.outputs.number }}
              REPO: ${{ github.repository }}
           run: |
              PAYLOAD=$(jq -c -n --argjson prNumber "${PR_NUMBER}" --arg repo "${REPO}" '{prNumber: $prNumber, repo: $repo}')
              bunx flue run pr-review --target node --id "pr-review-${PR_NUMBER}" --payload "$PAYLOAD"
