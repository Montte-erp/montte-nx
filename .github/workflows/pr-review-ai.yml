name: PR Review AI

on:
   issue_comment:
      types: [created]
   workflow_dispatch:
      inputs:
         pr_number:
            description: "Número da PR para revisão"
            required: true
            type: number

permissions:
   id-token: write
   contents: read
   pull-requests: write
   issues: write
   checks: read

jobs:
   review:
      if: |
         github.event_name == 'workflow_dispatch' ||
         (
           github.event.issue.pull_request &&
           (
             startsWith(github.event.comment.body, '/review') ||
             contains(github.event.comment.body, '\n/review')
           )
         )
      runs-on: ubuntu-latest
      timeout-minutes: 30
      steps:
         - name: Resolve PR metadata
           id: pr
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              GH_REPO: ${{ github.repository }}
              EVENT_NAME: ${{ github.event_name }}
              EVENT_PR_NUMBER: ${{ github.event.issue.number }}
              INPUT_PR_NUMBER: ${{ inputs.pr_number }}
              COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
           run: |
              if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                PR_NUMBER="$INPUT_PR_NUMBER"
              else
                PR_NUMBER="$EVENT_PR_NUMBER"
              fi

              if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "0" ]; then
                echo "PR_NUMBER not found" >&2
                exit 1
              fi

              gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json number,headRefOid,baseRefName,isCrossRepository --jq '
                "number=\(.number)\nhead_sha=\(.headRefOid)\nbase_ref=\(.baseRefName)\nis_cross_repository=\(.isCrossRepository)"
              ' >> "$GITHUB_OUTPUT"

              if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                echo "authorized=true" >> "$GITHUB_OUTPUT"
              else
                PERMISSION="$(gh api "repos/$GH_REPO/collaborators/$COMMENT_AUTHOR/permission" --jq '.permission')"
                case "$PERMISSION" in
                  admin|maintain|write)
                    echo "authorized=true" >> "$GITHUB_OUTPUT"
                    ;;
                  *)
                    echo "authorized=false" >> "$GITHUB_OUTPUT"
                    ;;
                esac
              fi

         - name: Skip unauthorized request
           if: steps.pr.outputs.authorized != 'true'
           run: |
              echo "Usuário sem permissão para acionar /review." >> "$GITHUB_STEP_SUMMARY"

         - name: Skip fork PR
           if: steps.pr.outputs.is_cross_repository == 'true'
           run: |
              echo "Review automático ignorado para PR de fork para não expor secrets." >> "$GITHUB_STEP_SUMMARY"

         - name: Checkout PR head
           if: steps.pr.outputs.authorized == 'true' && steps.pr.outputs.is_cross_repository != 'true'
           uses: actions/checkout@v6
           with:
              ref: ${{ steps.pr.outputs.head_sha }}
              fetch-depth: 0
              persist-credentials: false

         - name: Setup Bun
           if: steps.pr.outputs.authorized == 'true' && steps.pr.outputs.is_cross_repository != 'true'
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: latest

         - name: Install dependencies
           if: steps.pr.outputs.authorized == 'true' && steps.pr.outputs.is_cross_repository != 'true'
           run: bun install --frozen-lockfile

         - name: Run PR Review Agent
           if: steps.pr.outputs.authorized == 'true' && steps.pr.outputs.is_cross_repository != 'true'
           env:
              OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              PR_NUMBER: ${{ steps.pr.outputs.number }}
              REPO: ${{ github.repository }}
           run: |
              PAYLOAD=$(jq -c -n --argjson prNumber "${PR_NUMBER}" --arg repo "${REPO}" '{prNumber: $prNumber, repo: $repo}')
              bunx flue run pr-review --target node --id "pr-review-${PR_NUMBER}" --payload "$PAYLOAD"

         - name: Upload review artifacts
           if: always() && steps.pr.outputs.authorized == 'true' && steps.pr.outputs.is_cross_repository != 'true'
           uses: actions/upload-artifact@v4
           with:
              name: pr-review-ai-${{ steps.pr.outputs.number }}
              path: .review
              if-no-files-found: ignore
