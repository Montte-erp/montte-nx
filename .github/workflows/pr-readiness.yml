name: PR Readiness

on:
   workflow_dispatch:
      inputs:
         pr_number:
            description: "Pull request number"
            required: true
            type: number
   issue_comment:
      types: [created]

permissions:
   id-token: write
   contents: read
   pull-requests: write
   issues: write
   actions: read
   checks: read

jobs:
   readiness:
      if: |
         github.event_name == 'workflow_dispatch' ||
         (github.event.issue.pull_request != null &&
          (contains(github.event.comment.user.login, 'cubic') ||
           contains(github.event.comment.body, '/readiness')))
      runs-on: blacksmith-4vcpu-ubuntu-2404
      steps:
         - name: Resolve PR metadata
           id: pr
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              GH_REPO: ${{ github.repository }}
              EVENT_NAME: ${{ github.event_name }}
              INPUT_PR_NUMBER: ${{ inputs.pr_number }}
              ISSUE_PR_NUMBER: ${{ github.event.issue.number }}
           run: |
              if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                PR_NUMBER="$INPUT_PR_NUMBER"
              else
                PR_NUMBER="$ISSUE_PR_NUMBER"
              fi

              gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json number,headRefName,headRefOid,baseRefName,headRepositoryOwner --jq '
                "number=\(.number)\nhead_ref=\(.headRefName)\nhead_sha=\(.headRefOid)\nbase_ref=\(.baseRefName)\nhead_owner=\(.headRepositoryOwner.login)"
              ' >> "$GITHUB_OUTPUT"

         - name: Checkout PR head
           uses: actions/checkout@v6
           with:
              ref: ${{ steps.pr.outputs.head_sha }}
              fetch-depth: 0
              persist-credentials: false

         - name: Collect PR context
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              GH_REPO: ${{ github.repository }}
              PR_NUMBER: ${{ steps.pr.outputs.number }}
              BASE_REF: ${{ steps.pr.outputs.base_ref }}
           run: |
              git fetch origin "$BASE_REF" --depth=1

              {
                echo "# PR #$PR_NUMBER"
                echo
                echo "## PR metadata"
                gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json title,author,state,isDraft,mergeable,reviewDecision,additions,deletions,changedFiles,labels,url,body \
                  --jq '{title, author: .author.login, state, isDraft, mergeable, reviewDecision, additions, deletions, changedFiles, labels: [.labels[].name], url, body}'
                echo
                echo "## Changed files"
                gh pr diff "$PR_NUMBER" --repo "$GH_REPO" --name-only
                echo
                echo "## Commits"
                git log --pretty=format:'- %s (%h) by %an' "origin/$BASE_REF..HEAD"
                echo
                echo
                echo "## CI checks"
                gh pr checks "$PR_NUMBER" --repo "$GH_REPO" || true
                echo
                echo "## All reviews"
                gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json reviews \
                  --jq '.reviews[] | {state, submittedAt, author: .author.login, body}'
                echo
                echo "## All inline review comments"
                gh api "repos/$GH_REPO/pulls/$PR_NUMBER/comments" --paginate \
                  --jq '.[] | {path, line, user: .user.login, createdAt: .created_at, body, html_url}'
                echo
                echo "## All general PR comments"
                gh api "repos/$GH_REPO/issues/$PR_NUMBER/comments" --paginate \
                  --jq '.[] | {user: .user.login, createdAt: .created_at, body, html_url}'
              } > pr-readiness-context.md

         - name: Generate readiness report via opencode
           uses: anomalyco/opencode/github@latest
           env:
              OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
              CONTEXT_FILE: pr-readiness-context.md
              OUTPUT_FILE: PR_READINESS.md
           with:
              model: opencode-go/deepseek-v4-flash
              prompt: |
                 Você é um engenheiro senior fazendo um resumão consolidado de PR no monorepo Montte.

                 Leia `$CONTEXT_FILE` (metadata, arquivos, commits, CI checks, todos os reviews, todos os inline comments, todos os general comments) e escreva `$OUTPUT_FILE` em Markdown pt-BR.

                 Objetivo: agregar TUDO que foi comentado no PR até agora — Cubic, humanos, bots — em um resumão único, sem repetir comentários longos. Decidir se o PR está pronto pra merge.

                 Estrutura obrigatória:

                 ```markdown
                 ## 📋 Resumão do PR

                 **Status:** pronto | atenção | bloquear
                 **CI:** verde | falhando (lista jobs falhando)
                 **Reviews:** <quem revisou e veredito>

                 ## 🎯 O que esse PR faz
                 <2-3 frases sobre impacto>

                 ## 🚧 Bloqueios
                 <só problemas que impedem merge; omita se não houver>

                 ## 💬 O que foi discutido
                 <consolide TODOS os pontos levantados nos comentários (Cubic + humanos + bots): inline + reviews + general. Agrupe por tema. Marque resolvido vs pendente quando dá pra inferir>

                 ## ⚠️ Pontos de Atenção
                 <riscos: testes, migrações, UX, segurança, billing, DBOS, oRPC, env, release; omita se vazio>

                 ## ✅ Validação Recomendada
                 <comandos reais do repo: `bun run typecheck`, `bun run test`, `bun run check`, `bun run check-boundaries`, `bun run build`>

                 ## 🤖 Cubic
                 <resuma achados do Cubic: pendentes, resolvidos, irrelevantes>
                 ```

                 Regras:
                 - Conservador com `bloquear`: só pra CI vermelho (não-flake), conflito, migração destrutiva sem plano, quebra de contrato, segredo, bug claro.
                 - Distinguir flake de infra (502 do GHA cache, opencode quota) vs falha real.
                 - Não inventar detalhes fora do contexto.
                 - Não copiar comentários longos — sintetiza.
                 - Não inclua SHAs longos nem autores além de links já presentes.
                 - Bullets curtos, sem nested.
                 - pt-BR.

         - name: Verify readiness report
           run: |
              if [ ! -s PR_READINESS.md ]; then
                echo "PR_READINESS.md missing or empty" >&2
                exit 1
              fi

         - name: Comment readiness report
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              GH_REPO: ${{ github.repository }}
              PR_NUMBER: ${{ steps.pr.outputs.number }}
           run: gh pr comment "$PR_NUMBER" --repo "$GH_REPO" --body-file PR_READINESS.md

         - name: Upload readiness artifacts
           uses: actions/upload-artifact@v4
           with:
              name: pr-readiness-${{ steps.pr.outputs.number }}
              path: |
                 pr-readiness-context.md
                 PR_READINESS.md
